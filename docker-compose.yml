# ============================================
# Garden College Web — Docker Compose (Producción)
# 
# Deploy: Oracle Cloud Free Tier (ARM64)
# Contingencia: Hostinger VPS (AMD64) — mismo compose funciona
#
# USO:
#   cp .env.example .env  (editar con valores reales)
#   docker compose up -d --build
#
# BACKUP MANUAL:
#   docker compose exec db pg_dump -U garden garden_web | gzip > backup_$(date +%Y%m%d).sql.gz
#
# RESTORE:
#   gunzip -c backup_YYYYMMDD.sql.gz | docker compose exec -T db psql -U garden garden_web
# ============================================

services:
  # --- App (Next.js) ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: garden-app
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://garden:${DB_PASSWORD}@db:5432/garden_web
      - NEXTAUTH_URL=${SITE_URL}
      - NEXTAUTH_SECRET=${AUTH_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - ALLOWED_EMAIL_DOMAIN=${ALLOWED_EMAIL_DOMAIN}
    volumes:
      - uploads:/app/public/uploads
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # --- PostgreSQL ---
  db:
    image: postgres:16-alpine
    container_name: garden-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=garden
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=garden_web
    volumes:
      - pgdata:/var/lib/postgresql/data
      - backups:/backups
    networks:
      - internal
    # NO exponer puertos al exterior. Solo red interna Docker.
    # ports: [] ← intencionalmente sin ports
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garden -d garden_web"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Nginx (reverse proxy + SSL) ---
  nginx:
    image: nginx:alpine
    container_name: garden-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
    networks:
      - internal
    depends_on:
      app:
        condition: service_healthy

  # --- Certbot (SSL Let's Encrypt) ---
  certbot:
    image: certbot/certbot
    container_name: garden-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    # Renovación: ejecutar periódicamente
    # docker compose run certbot renew
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 6h & wait $${!}; certbot renew; done'"

  # --- Backup automático (cron) ---
  backup:
    image: postgres:16-alpine
    container_name: garden-backup
    restart: unless-stopped
    environment:
      - PGHOST=db
      - PGUSER=garden
      - PGPASSWORD=${DB_PASSWORD}
      - PGDATABASE=garden_web
      - BACKUP_RETENTION_DAYS=30
    volumes:
      - backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
    # Ejecutar backup diario a las 3 AM
    entrypoint: >
      sh -c '
        chmod +x /backup.sh &&
        echo "0 3 * * * /backup.sh" | crontab - &&
        echo "Backup cron configurado. Primer backup en ejecución..." &&
        /backup.sh &&
        crond -f
      '

volumes:
  pgdata:
    name: garden-pgdata
  uploads:
    name: garden-uploads
  backups:
    name: garden-backups
    # En producción, mapear a un directorio del host para fácil acceso:
    # driver: local
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: /opt/garden-backups
  certbot-etc:
    name: garden-certbot-etc
  certbot-var:
    name: garden-certbot-var

networks:
  internal:
    name: garden-internal
    driver: bridge
