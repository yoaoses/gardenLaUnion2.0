# ============================================
# Garden College Web — Docker Compose (Desarrollo)
#
# USO:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# O para solo la BD (desarrollo con next dev local):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up db -d
#   npm run dev
# ============================================

services:
  app:
    build:
      target: deps  # Solo instalar deps, no build
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    environment:
      - NODE_ENV=development
    ports:
      - "3000:3000"

  db:
    ports:
      - "5432:5432"  # Exponer en dev para acceso con pgAdmin/DBeaver

  # En dev no necesitamos nginx, certbot, ni backup
  nginx:
    profiles: ["production"]
  certbot:
    profiles: ["production"]
  backup:
    profiles: ["production"]
