# ============================================
# Garden College Web — Nginx (Producción)
# Reverse proxy + SSL + cache de assets
# ============================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Compresión
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Rate limiting para formulario de contacto
    limit_req_zone $binary_remote_addr zone=contacto:10m rate=5r/h;

    # Rate limiting general
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/m;

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.tile.openstreetmap.org; connect-src 'self'; frame-src 'none';" always;

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name _;

        # Certbot challenge
        location /.well-known/acme-challenge/ {
            root /var/lib/letsencrypt;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl http2;
        # CAMBIAR: poner el dominio real
        server_name gardencollege.cl www.gardencollege.cl;

        # SSL — Let's Encrypt
        # CAMBIAR: poner el dominio real en las rutas
        ssl_certificate /etc/letsencrypt/live/gardencollege.cl/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/gardencollege.cl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

        # HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Tamaño máximo de upload (para fotos)
        client_max_body_size 10M;

        # Assets estáticos de Next.js — cache largo
        location /_next/static/ {
            proxy_pass http://app:3000;
            expires 365d;
            add_header Cache-Control "public, immutable";
        }

        # Imágenes subidas — cache medio
        location /uploads/ {
            proxy_pass http://app:3000;
            expires 30d;
            add_header Cache-Control "public";
        }

        # Rate limit en formulario de contacto
        location /api/contacto {
            limit_req zone=contacto burst=2 nodelay;
            proxy_pass http://app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin — rate limit más permisivo
        location /admin {
            limit_req zone=general burst=10 nodelay;
            proxy_pass http://app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Todo lo demás → Next.js
        location / {
            proxy_pass http://app:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
